<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA Recruitment Portal Prototype</title>
  <style>

:root {
  --bg: #f5f1ea;
  --surface: rgba(255, 255, 255, 0.82);
  --surface-strong: rgba(255, 253, 249, 0.96);
  --surface-muted: #f7f3ec;
  --line: #ddd3c4;
  --line-strong: #c9bda9;
  --text: #29313b;
  --muted: #6f7885;
  --shadow: 0 18px 46px rgba(63, 72, 88, 0.08);
  --shadow-soft: 0 8px 24px rgba(63, 72, 88, 0.05);
  --radius-xl: 32px;
  --radius-lg: 24px;
  --radius-md: 18px;
  --radius-sm: 14px;
  --accent: #dbe6ee;
  --accent-strong: #c8d7e3;
  --accent-soft: #eef4f7;
  --accent-text: #3e5b6f;
  --success: #e5efe6;
  --success-text: #537157;
  --warning: #f3ebdc;
  --warning-text: #7a6342;
  --danger: #f4e4e1;
  --danger-text: #8b5e58;
  --purple: #ece8f8;
  --purple-text: #66598a;
  --gold: #fff3d8;
  --gold-text: #8c6b20;
  --focus: 0 0 0 4px rgba(198, 214, 226, 0.42);
  color-scheme: light;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  font-family: Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(220, 232, 239, 0.7), transparent 22%),
    radial-gradient(circle at bottom right, rgba(239, 229, 216, 0.8), transparent 20%),
    linear-gradient(180deg, #f8f5ef 0%, #efe8de 100%);
}

body[data-role="TA"] {
  --accent: #dbe6ee;
  --accent-strong: #c8d7e3;
  --accent-soft: #eef4f7;
  --accent-text: #3e5b6f;
}

body[data-role="MO"] {
  --accent: #dfe9df;
  --accent-strong: #cfe0cf;
  --accent-soft: #eef5ee;
  --accent-text: #537057;
}

body[data-role="AD"] {
  --accent: #ede4db;
  --accent-strong: #decfbe;
  --accent-soft: #f5efe8;
  --accent-text: #725d4b;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select,
textarea {
  font: inherit;
  color: inherit;
}

button {
  appearance: none;
}

img {
  max-width: 100%;
}

#app {
  min-height: 100%;
}

.visually-hidden {
  position: absolute !important;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
  border: 0;
}

.auth-shell {
  min-height: 100vh;
  padding: 24px;
  display: grid;
  place-items: center;
}

.auth-frame {
  width: min(1160px, 100%);
  min-height: 720px;
  display: grid;
  grid-template-columns: 1.08fr 0.92fr;
  border: 1px solid var(--line);
  border-radius: 34px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.84);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.brand-side,
.auth-side {
  padding: 42px;
}

.brand-side {
  border-right: 1px solid var(--line);
  background:
    radial-gradient(circle at top right, rgba(255, 255, 255, 0.65), transparent 30%),
    linear-gradient(180deg, rgba(239, 244, 247, 0.82), rgba(248, 245, 239, 0.98));
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 28px;
}

.auth-side {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 24px;
}

.logo-badge {
  width: 70px;
  height: 70px;
  display: grid;
  place-items: center;
  border-radius: 24px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, var(--accent-soft), #ffffff);
  color: var(--accent-text);
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 0.08em;
  box-shadow: var(--shadow-soft);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.64);
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  width: fit-content;
}

.hero-title,
.auth-title {
  margin: 0;
  font-size: 52px;
  line-height: 0.98;
  letter-spacing: -0.04em;
}

.hero-copy,
.auth-copy {
  margin: 0;
  color: var(--muted);
  line-height: 1.65;
  font-size: 17px;
}

.brand-panel {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.feature-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.feature-card,
.role-card,
.stat-card,
.card,
.toolbar,
.data-callout,
.auth-card,
.glass-card {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: rgba(255, 255, 255, 0.78);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(8px);
}

.feature-card {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 132px;
}

.feature-kicker {
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.feature-value {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.auth-card,
.glass-card {
  padding: 28px;
}

.stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.row.space {
  justify-content: space-between;
}

.button-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 11px 16px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 242, 235, 0.96));
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  color: var(--text);
  min-height: 46px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  white-space: nowrap;
}

.btn:hover,
.nav-item:hover,
.table-row-clickable:hover,
.list-item:hover,
.chip:hover,
.tab:hover,
.selectable:hover,
.icon-btn:hover,
.file-box:hover {
  transform: translateY(-1px);
  border-color: var(--line-strong);
  box-shadow: 0 12px 28px rgba(63, 72, 88, 0.08);
}

.btn-primary {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  color: var(--accent-text);
  border-color: var(--accent-strong);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.76);
}

.btn-danger {
  background: linear-gradient(180deg, rgba(244, 228, 225, 0.84), rgba(255, 255, 255, 0.94));
  color: var(--danger-text);
  border-color: rgba(201, 154, 148, 0.55);
}

.btn-quiet {
  padding: 9px 12px;
  border-radius: 14px;
  min-height: auto;
  font-size: 13px;
}

.icon-btn {
  width: 42px;
  height: 42px;
  padding: 0;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.76);
  display: inline-grid;
  place-items: center;
  cursor: pointer;
}

.form-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.form-grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field.compact {
  gap: 6px;
}

.field.full {
  grid-column: 1 / -1;
}

.label {
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.input,
.select,
.textarea,
.input-like {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.84);
  min-height: 48px;
  padding: 12px 14px;
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
  outline: none;
}

.textarea {
  min-height: 128px;
  resize: vertical;
  line-height: 1.55;
}

.input:focus,
.select:focus,
.textarea:focus {
  border-color: var(--accent-strong);
  box-shadow: var(--focus);
}

.check {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-height: 48px;
  padding: 0 6px;
  color: var(--muted);
}

.check input {
  width: 18px;
  height: 18px;
  accent-color: var(--accent-text);
}

.role-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.role-card {
  padding: 24px;
  min-height: 230px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 18px;
  position: relative;
  overflow: hidden;
}

.role-card::after,
.card-glow::after {
  content: "";
  position: absolute;
  right: -38px;
  bottom: -52px;
  width: 160px;
  height: 160px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(218, 229, 236, 0.7), transparent 62%);
  pointer-events: none;
}

.role-icon,
.mini-icon,
.avatar,
.nav-key,
.metric-icon,
.status-dot {
  display: inline-grid;
  place-items: center;
}

.role-icon {
  width: 52px;
  height: 52px;
  border-radius: 18px;
  border: 1px solid var(--accent-strong);
  background: var(--accent-soft);
  color: var(--accent-text);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.08em;
}

.role-name {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.role-copy {
  color: var(--muted);
  line-height: 1.6;
}

.shell {
  padding: 18px;
  min-height: 100vh;
}

.app-frame {
  width: min(1480px, 100%);
  min-height: calc(100vh - 36px);
  margin: 0 auto;
  overflow: hidden;
  border-radius: 34px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
}

.topbar {
  min-height: 78px;
  border-bottom: 1px solid var(--line);
  background: rgba(252, 249, 244, 0.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 14px 22px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.brand-title {
  font-weight: 800;
  letter-spacing: -0.02em;
}

.brand-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px 8px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.7);
  min-width: 0;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  border: 1px solid var(--accent-strong);
  color: var(--accent-text);
  font-weight: 800;
  font-size: 13px;
  flex: 0 0 36px;
}

.user-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.user-meta strong {
  font-size: 14px;
  line-height: 1.2;
}

.user-meta span {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.2;
}

.app-layout {
  display: grid;
  grid-template-columns: 258px 1fr;
  min-height: calc(100vh - 78px);
}

.sidebar {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(245, 242, 236, 0.9), rgba(250, 248, 244, 0.96));
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.side-card {
  border: 1px solid var(--line);
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.78);
  padding: 18px;
  box-shadow: var(--shadow-soft);
}

.side-card strong {
  display: block;
  font-size: 24px;
  letter-spacing: -0.03em;
}

.side-meta {
  color: var(--muted);
  margin-top: 6px;
  font-size: 14px;
  line-height: 1.5;
}

.nav-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-label {
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0 4px;
}

.nav-item {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.72);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}

.nav-item.active {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  color: var(--accent-text);
  border-color: var(--accent-strong);
}

.nav-key {
  width: 32px;
  height: 32px;
  border-radius: 12px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-strong);
  color: var(--accent-text);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  flex: 0 0 32px;
}

.nav-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-text strong {
  font-size: 14px;
  line-height: 1.2;
}

.nav-text span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
}

.side-metrics {
  display: grid;
  gap: 10px;
}

.metric-tile {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(246, 242, 235, 0.94));
  box-shadow: var(--shadow-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.metric-copy {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.metric-copy span {
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.metric-copy strong {
  font-size: 26px;
  letter-spacing: -0.03em;
  color: var(--accent-text);
}

.metric-icon {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  border: 1px solid var(--accent-strong);
  background: var(--accent-soft);
  color: var(--accent-text);
  font-size: 13px;
  font-weight: 800;
}

.sidebar-note {
  margin-top: auto;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}

.content {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.page-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 12px;
  border-bottom: 1px dashed var(--line);
}

.page-head h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: -0.04em;
}

.page-meta,
.helper-text,
.muted {
  color: var(--muted);
}

.page-meta {
  margin-top: 8px;
  line-height: 1.55;
}

.page-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.badge,
.pill,
.chip,
.tab,
.count-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  white-space: nowrap;
}

.badge {
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid transparent;
}

.badge::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: currentColor;
  opacity: 0.72;
}

.badge-open {
  background: var(--accent-soft);
  color: var(--accent-text);
  border-color: rgba(102, 133, 157, 0.18);
}

.badge-under-review {
  background: var(--warning);
  color: var(--warning-text);
}

.badge-approved {
  background: var(--success);
  color: var(--success-text);
}

.badge-rejected,
.badge-frozen,
.badge-closed {
  background: var(--danger);
  color: var(--danger-text);
}

.badge-pending-interview,
.badge-draft {
  background: var(--purple);
  color: var(--purple-text);
}

.badge-supplement-requested,
.badge-warning,
.badge-action-needed {
  background: var(--gold);
  color: var(--gold-text);
}

.badge-active {
  background: var(--success);
  color: var(--success-text);
}

.badge-default {
  background: rgba(255, 255, 255, 0.72);
  color: var(--muted);
  border-color: var(--line);
}

.toolbar {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.toolbar-grid {
  display: grid;
  grid-template-columns: 1.25fr 0.95fr 0.95fr auto;
  gap: 14px;
}

.toolbar-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  flex-wrap: wrap;
}

.grid {
  display: grid;
  gap: 18px;
}

.grid.metrics {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.grid.split {
  grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
}

.grid.even {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.card {
  overflow: hidden;
}

.card-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: linear-gradient(180deg, rgba(247, 243, 237, 0.88), rgba(255, 255, 255, 0.96));
}

.card-title {
  font-weight: 700;
  letter-spacing: -0.01em;
}

.card-body {
  padding: 18px;
}

.card-body.compact {
  padding: 14px 18px 18px;
}

.count-badge {
  padding: 6px 10px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.7);
  color: var(--muted);
  font-size: 12px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.summary-item {
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.66);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.summary-item span {
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.summary-item strong {
  font-size: 16px;
  line-height: 1.4;
}

.tag-row,
.tab-row,
.pill-row,
.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.chip,
.pill,
.tab {
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.72);
  padding: 8px 12px;
  cursor: pointer;
}

.chip,
.pill {
  color: var(--text);
}

.tab {
  min-height: 42px;
}

.pill.active,
.tab.active {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  color: var(--accent-text);
  border-color: var(--accent-strong);
}

.card-stack,
.list-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.list-item,
.file-box,
.selectable {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.76);
  padding: 14px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.selectable.active,
.list-item.active {
  border-color: var(--accent-strong);
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247, 244, 238, 0.96));
  box-shadow: 0 14px 28px rgba(63, 72, 88, 0.08);
}

.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.list-main {
  min-width: 0;
}

.list-title {
  font-weight: 700;
  line-height: 1.35;
}

.list-subtitle {
  color: var(--muted);
  margin-top: 6px;

let state = loadState();

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return clone(DEFAULT_STATE);
    return { ...clone(DEFAULT_STATE), ...JSON.parse(raw) };
  } catch (error) {
    return clone(DEFAULT_STATE);
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function resetDemo() {
  state = clone(DEFAULT_STATE);
  saveState();
  showToast('Demo data has been reset.');
  go('welcome');
}

function route() {
  return location.hash.replace(/^#\/?/, '') || 'welcome';
}

function go(nextRoute) {
  location.hash = '#/' + nextRoute;
}

function initials(name = '') {
  return name
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map((part) => part[0])
    .join('')
    .toUpperCase();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function setPath(obj, path, value) {
  const keys = path.split('.');
  let target = obj;
  while (keys.length > 1) {
    const key = keys.shift();
    if (!Object.prototype.hasOwnProperty.call(target, key) || typeof target[key] !== 'object') {
      target[key] = {};
    }
    target = target[key];
  }
  target[keys[0]] = value;
}

function getPath(obj, path) {
  return path.split('.').reduce((acc, key) => acc?.[key], obj);
}

function nowStamp() {
  const now = new Date();
  return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

function pad(number) {
  return String(number).padStart(2, '0');
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr);
  if (Number.isNaN(date.getTime())) return dateStr;
  return date.toLocaleDateString('en-GB', {
    day: '2-digit',
    month: 'short',
    year: 'numeric'
  });
}

function statusBadge(status) {
  const map = {
    'Open': 'badge badge-open',
    'Filled': 'badge badge-approved',
    'Closed': 'badge badge-closed',
    'Draft': 'badge badge-draft',
    'Under Review': 'badge badge-under-review',
    'Approved': 'badge badge-approved',
    'Rejected': 'badge badge-rejected',
    'Supplement Requested': 'badge badge-supplement-requested',
    'Pending Interview': 'badge badge-pending-interview',
    'Active': 'badge badge-active',
    'Warning': 'badge badge-warning',
    'Frozen': 'badge badge-frozen',
    'Reached Upper Limit': 'badge badge-warning',
    'Action Needed': 'badge badge-action-needed'
  };
  return `<span class="${map[status] || 'badge badge-default'}">${escapeHtml(status)}</span>`;
}

}

function pushLog(action, role, actor, target, result) {

}

function daysOpen(job) {
  const from = new Date(job.postedAt);
  const to = new Date('2026-03-20');
  const diff = Math.max(0, to.getTime() - from.getTime());
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function vacancies(job) {
  return Math.max(0, Number(job.seats) - Number(job.filledSeats));
}

function isStaleUnfilled(job) {
  return vacancies(job) > 0 && daysOpen(job) > 7 && job.status === 'Open';
}

function taVisibleJobs() {
  let items = [...state.jobs];
  if (state.ta.openOnly) {
    items = items.filter((job) => job.status === 'Open');
  }
  const search = state.ta.search.trim().toLowerCase();
  if (search) {
    items = items.filter((job) =>
      [job.module, job.code, job.school].some((field) => field.toLowerCase().includes(search))
    );
  }
  if (state.ta.moFilter !== 'All') {
    items = items.filter((job) => job.moName === state.ta.moFilter);
  }
  items.sort((a, b) => {
    if (state.ta.sort === 'Latest') return a.startDate < b.startDate ? 1 : -1;
    return a.startDate > b.startDate ? 1 : -1;
  });
  return items;
}

function filteredTaHistory() {
  const items = applicationsForCurrentTA().sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
  if (state.ta.historyFilter === 'All') return items;
  return items.filter((app) => app.status === state.ta.historyFilter);
}

function currentMoApplications() {
  const ownedJobIds = new Set(jobsForCurrentMO().map((job) => job.id));
  let items = state.applications.filter((app) => ownedJobIds.has(app.jobId));
  if (state.mo.selectedJobId) {
    items = items.filter((app) => app.jobId === state.mo.selectedJobId);
  }
  if (state.mo.statusFilter !== 'All') {
    items = items.filter((app) => app.status === state.mo.statusFilter);
  }
  items.sort((a, b) => (a.updatedAt < b.updatedAt ? 1 : -1));
  return items;
}

function filteredAccounts() {
  let items = [...state.accounts];
  const search = state.ad.accountSearch.trim().toLowerCase();
  if (search) {
    items = items.filter((account) =>
      [account.name, account.email, account.department].some((field) => field.toLowerCase().includes(search))
    );
  }
  if (state.ad.accountRole !== 'All') {
    items = items.filter((account) => account.role === state.ad.accountRole);
  }
  if (state.ad.accountStatus !== 'All') {
    items = items.filter((account) => account.status === state.ad.accountStatus);
  }
  return items;
}

function filteredLogs() {
  let items = [...state.logs];
  if (state.ad.logRole !== 'All') {
    items = items.filter((log) => log.role === state.ad.logRole);
  }
  if (state.ad.logAction !== 'All') {
    items = items.filter((log) => log.action === state.ad.logAction);
  }
  return items;
}

function ensureSelections() {
  const visibleTaJobs = taVisibleJobs();
  if (visibleTaJobs.length && !visibleTaJobs.some((job) => job.id === state.ta.selectedJobId)) {
    state.ta.selectedJobId = visibleTaJobs[0].id;
  }

  const ownedJobs = jobsForCurrentMO();
  if (ownedJobs.length && !ownedJobs.some((job) => job.id === state.mo.selectedJobId)) {
    state.mo.selectedJobId = ownedJobs[0].id;
  }

  const moApps = currentMoApplications();
  if (moApps.length && !moApps.some((app) => app.id === state.mo.selectedAppId)) {
    state.mo.selectedAppId = moApps[0].id;
  }

  const accounts = filteredAccounts();
  if (accounts.length && !accounts.some((account) => account.id === state.ad.selectedAccountId)) {
    state.ad.selectedAccountId = accounts[0].id;
  }
}

function updateSeatCount(jobId, previousStatus, nextStatus) {
  const job = getJob(jobId);
  if (!job) return;
  if (previousStatus === 'Approved' && nextStatus !== 'Approved') {
    job.filledSeats = Math.max(0, job.filledSeats - 1);
  }
  if (previousStatus !== 'Approved' && nextStatus === 'Approved') {
    job.filledSeats = Math.min(job.seats, job.filledSeats + 1);
  }
  if (job.filledSeats >= job.seats) {
    job.status = 'Filled';
  } else if (job.status === 'Filled' || job.status === 'Closed') {
    // keep closed if explicitly closed
    if (job.status !== 'Closed') {
      job.status = 'Open';
    }
  }
}

function submitApplication() {
  const job = getJob(state.ta.selectedJobId);
  if (!job) return;
  const uploadName = state.ta.uploadName || state.profile.cvName;
  if (!uploadName) {
    showToast('A PDF CV is required before submission.');
    return;
  }

  const existing = currentTAApplicationForJob(job.id);
  if (existing && existing.status !== 'Supplement Requested') {
    showToast('An application already exists for this position.');
    return;
  }

  if (existing && existing.status === 'Supplement Requested') {
    existing.cvName = uploadName;
    existing.statement = state.ta.applyStatement.trim() || existing.statement;
    existing.status = 'Under Review';
    existing.updatedAt = nowStamp();
    existing.submittedAt = nowStamp();
    pushNotification('TA', 'Under Review', `${job.module} resubmitted`, 'Your updated material was submitted successfully.', 'ta/my');
    pushNotification('MO', 'New Application', `Updated material received for ${job.module}`, `${USERS.TA.name} submitted revised application material.`, 'mo/applications');
    pushLog('Supplement Submitted', 'TA', USERS.TA.name, job.module, 'Open');
    state.ta.applyStatement = '';
    state.ta.uploadName = '';
    saveState();
    showToast('Updated application submitted.');
    go('ta/my');
    return;
  }

  const newApp = {
    id: `APP-${Date.now()}`,
    jobId: job.id,
    applicantId: USERS.TA.id,
    applicantName: USERS.TA.name,
    applicantEmail: USERS.TA.email,
    applicantMajor: state.profile.major,
    applicantYear: state.profile.year,
    applicantLanguage: `CET-6 ${state.profile.cet6}`,
    skills: ['Profile based', 'CV uploaded', 'Statement included'],
    statement: state.ta.applyStatement.trim(),
    cvName: uploadName,
    status: 'Under Review',
    submittedAt: nowStamp(),
    updatedAt: nowStamp()
  };
  state.applications.unshift(newApp);
  state.mo.selectedJobId = job.ownerId === USERS.MO.id ? job.id : state.mo.selectedJobId;
  state.mo.selectedAppId = newApp.id;
  pushNotification('TA', 'Under Review', `${job.module} submitted`, 'Your application has been submitted successfully.', 'ta/my');
  pushNotification('MO', 'New Application', `New application for ${job.module}`, `${USERS.TA.name} submitted a new CV and statement.`, 'mo/applications');
  pushLog('Application Submitted', 'TA', USERS.TA.name, job.module, 'Open');
  state.ta.applyStatement = '';
  state.ta.uploadName = '';
  saveState();
  showToast('Application submitted.');
  go('ta/my');
}

function reviewApplication(nextStatus) {
  const app = getApplication(state.mo.selectedAppId);
  if (!app) return;
  const previousStatus = app.status;
  app.status = nextStatus;
  app.updatedAt = nowStamp();
  updateSeatCount(app.jobId, previousStatus, nextStatus);
  const job = getJob(app.jobId);
  pushLog(`Application ${nextStatus}`, 'MO', USERS.MO.name, job?.module || app.jobId, 'Done');
  if (app.applicantId === USERS.TA.id) {
    pushNotification('TA', nextStatus, `${job?.module || 'Application'} updated`, `Status changed to ${nextStatus}.`, 'ta/my');
  }
  saveState();
  showToast(`Applicant marked as ${nextStatus}.`);
  render();
}

function requestSupplement() {
  const app = getApplication(state.mo.selectedAppId);
  if (!app) return;
  const previousStatus = app.status;
  app.status = 'Supplement Requested';
  app.updatedAt = nowStamp();
  updateSeatCount(app.jobId, previousStatus, app.status);
  const job = getJob(app.jobId);
  pushLog('Supplement Requested', 'MO', USERS.MO.name, job?.module || app.jobId, 'Done');
  if (app.applicantId === USERS.TA.id) {
    pushNotification('TA', 'Supplement Requested', `${job?.module || 'Application'} needs an update`, 'Please upload a revised CV or add more detail in the application statement.', 'ta/project-schedule');
  }
  saveState();
  showToast('Supplement request sent.');
  render();
}

function serialId(prefix) {
  return `${prefix}-${String(Date.now()).slice(-6)}`;
}

function normaliseLaunchForm(source) {
  return {
    module: (source.module || '').trim(),
    code: (source.code || '').trim(),
    startDate: (source.startDate || '').trim(),
    deadline: (source.deadline || '').trim(),
    seats: Number(source.seats || 1),
    weeklyWorkload: (source.weeklyWorkload || '').trim(),
    schedule: (source.schedule || '').trim(),
    requirements: (source.requirements || '').trim(),
    details: (source.details || '').trim(),
    restrictionMajor: (source.restrictionMajor || '').trim(),
    restrictionLanguage: (source.restrictionLanguage || '').trim(),
    restrictionOther: (source.restrictionOther || '').trim()
  };
}

function fillFormFromSource(source, type) {
  state.mo.launchForm = {
    module: source.module || '',
    code: source.code || '',
    startDate: source.startDate || '',
    deadline: source.deadline || '',
    seats: String(source.seats || ''),
    weeklyWorkload: source.weeklyWorkload || '',
    schedule: source.schedule || '',
    requirements: source.requirements || '',
    details: source.details || '',
    restrictionMajor: source.restrictionMajor || '',
    restrictionLanguage: source.restrictionLanguage || '',
    restrictionOther: source.restrictionOther || ''
  };
  state.mo.editing = { type, id: source.id };
  saveState();
}

function saveDraft() {
  const form = normaliseLaunchForm(state.mo.launchForm);
  if (!form.module) {
    showToast('Add a module title before saving a draft.');
    return;
  }

  if (state.mo.editing?.type === 'draft') {
    const existing = getDraft(state.mo.editing.id);
    if (existing) {
      Object.assign(existing, form, { updatedAt: nowStamp() });
      pushLog('Draft Updated', 'MO', USERS.MO.name, form.module, 'Draft');
      saveState();
      showToast('Draft updated.');
      render();
      return;
    }
  }

  const draft = {
    id: serialId('DRF'),
    ownerId: USERS.MO.id,
    ...form,
    updatedAt: nowStamp()
  };
  state.drafts.unshift(draft);
  state.mo.editing = { type: 'draft', id: draft.id };
  pushLog('Draft Saved', 'MO', USERS.MO.name, form.module, 'Draft');
  saveState();
  showToast('Draft saved.');
  render();
}

function postJobFromDraft(draftId) {
  const draft = getDraft(draftId);
  if (!draft) return;
  fillFormFromSource(draft, 'draft');
  postJob();
}

function postJob() {
  const form = normaliseLaunchForm(state.mo.launchForm);
  if (!form.module || !form.code || !form.startDate || !form.deadline) {
    showToast('Module title, code, start date and deadline are required.');
    return;
  }

  const jobPayload = {
    module: form.module,
    code: form.code,
    ownerId: USERS.MO.id,
    moName: USERS.MO.name,
    school: 'School of Computing',
    startDate: form.startDate,
    deadline: form.deadline,
    postedAt: nowStamp().slice(0, 10),
    weeklyWorkload: form.weeklyWorkload || 'TBC',
    seats: Number(form.seats || 1),
    filledSeats: 0,
    status: 'Open',
    schedule: form.schedule || 'Optional timetable',
    summary: form.details || 'Newly posted teaching assistant position.',
    details: form.details || 'Newly posted teaching assistant position.',
    requirements: [
      form.restrictionMajor || null,
      form.restrictionLanguage || null,
      ...form.requirements.split(/\n+/).map((item) => item.trim()).filter(Boolean),
      form.restrictionOther || null
    ].filter(Boolean)
  };

  if (state.mo.editing?.type === 'job') {
    const existing = getJob(state.mo.editing.id);
    if (existing) {
      Object.assign(existing, jobPayload, { filledSeats: existing.filledSeats });
      pushLog('Position Updated', 'MO', USERS.MO.name, existing.module, 'Done');
      saveState();
      showToast('Position updated.');
      render();
      return;
    }
  }

  if (state.mo.editing?.type === 'draft') {
    state.drafts = state.drafts.filter((draft) => draft.id !== state.mo.editing.id);
  }

  const newJob = {
    id: serialId('JOB'),
    ...jobPayload
  };
  state.jobs.unshift(newJob);
  state.mo.selectedJobId = newJob.id;
  state.mo.editing = null;
  state.mo.launchForm = clone(DEFAULT_STATE.mo.launchForm);
  pushNotification('MO', 'Published', `${newJob.module} posted`, 'The position is now visible in the TA schedule.', 'mo/history');
  pushLog('Position Posted', 'MO', USERS.MO.name, newJob.module, 'Done');
  saveState();
  showToast('Position posted.');
  go('mo/history');
}

function closeJob(jobId) {
  const job = getJob(jobId);
  if (!job) return;
  job.status = 'Closed';
  pushLog('Position Closed', 'MO', USERS.MO.name, job.module, 'Done');
  saveState();
  showToast('Position closed.');
  render();
}

function remindMo(jobId) {
  const job = getJob(jobId);
  if (!job) return;
  pushNotification('MO', 'Reminder', `Reminder for ${job.module}`, `Please review vacancies for ${job.module}.`, 'mo/history');
  pushLog('Reminder Sent', 'AD', USERS.AD.name, job.module, 'Done');
  saveState();
  showToast('Reminder sent to the MO.');
  render();
}

function exportAction(target) {
  pushLog('CSV Export', 'AD', USERS.AD.name, target, 'Done');
  saveState();
  showToast(`${target} export prepared.`);
}

function importAccounts() {
  pushLog('CSV Import', 'AD', USERS.AD.name, 'Account Management', 'Done');
  saveState();
  showToast('CSV import simulated.');
}

function freezeAccount(accountId) {
  const account = getAccount(accountId);
  if (!account) return;
  account.status = 'Frozen';
  pushLog('Account Frozen', 'AD', USERS.AD.name, account.name, 'Done');
  saveState();
  showToast('Account frozen.');
  render();
}

function deleteAccount(accountId) {
  const account = getAccount(accountId);
  state.accounts = state.accounts.filter((item) => item.id !== accountId);
  pushLog('Account Deleted', 'AD', USERS.AD.name, account?.name || accountId, 'Done');
  saveState();
  showToast('Account deleted.');
  render();
}

function deleteDraft(draftId) {
  const draft = getDraft(draftId);
  state.drafts = state.drafts.filter((item) => item.id !== draftId);
  pushLog('Draft Deleted', 'MO', USERS.MO.name, draft?.module || draftId, 'Done');
  if (state.mo.editing?.type === 'draft' && state.mo.editing.id === draftId) {
    state.mo.editing = null;
    state.mo.launchForm = clone(DEFAULT_STATE.mo.launchForm);
  }
  saveState();
  showToast('Draft deleted.');
  render();
}

function addCourseRecord() {
  state.courseRecords.push({
    id: serialId('CR'),
    module: 'New module',
    grade: 'Pending'
  });
  saveState();
  showToast('Course record added.');
  render();
}

function addLanguageScore() {
  state.languageScores.push({
    id: serialId('LS'),
    name: 'New score',
    score: 'Pending'
  });
  saveState();
  showToast('Language score added.');
  render();
}

function saveProfile() {
  pushLog('Profile Saved', 'TA', USERS.TA.name, 'My Profile', 'Done');
  saveState();
  showToast('Profile saved.');
}

function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => toast.classList.remove('show'), 2200);
}

document.addEventListener('input', (event) => {
  const target = event.target;
  if (!target.matches('[data-bind]')) return;
  const path = target.dataset.bind;
  const value = target.type === 'checkbox' ? target.checked : target.value;
  setPath(state, path, value);
  saveState();
});

document.addEventListener('change', (event) => {
  const target = event.target;
  if (target.matches('[data-bind]') && target.type !== 'file') {
    if (target.dataset.bind === 'mo.selectedJobId' || target.dataset.bind === 'mo.statusFilter') {
      saveState();
      render();
      return;
    }
    saveState();
  }

  if (target.id === 'apply-cv-input') {
    const file = target.files?.[0];
    state.ta.uploadName = file ? file.name : '';
    saveState();
    render();
  }

  if (target.id === 'profile-cv-input') {
    const file = target.files?.[0];
    if (!file) return;
    state.profile.cvName = file.name;
    if (!state.ta.uploadName) {
      state.ta.uploadName = file.name;
    }
    saveState();
    render();
  }
});

document.addEventListener('click', (event) => {
  const target = event.target.closest(
    '[data-go], [data-set-role], [data-select-job], [data-select-app], [data-select-account], [data-ta-tab], [data-ta-history-filter], [data-mo-history-tab], [data-ad-project-tab], [data-action], [data-review-status], [data-load-draft], [data-load-job], [data-delete-draft], [data-post-draft]'
  );
  if (!target) return;

  if (target.dataset.go) {
    go(target.dataset.go);
    return;
  }

  if (target.dataset.setRole) {
    selectRole(target.dataset.setRole);
    return;
  }

  if (target.dataset.selectJob) {
    state.ta.selectedJobId = target.dataset.selectJob;
    state.mo.selectedJobId = target.dataset.selectJob;
    saveState();
    if (!target.dataset.go) render();
    return;
  }

  if (target.dataset.selectApp) {
    state.mo.selectedAppId = target.dataset.selectApp;
    saveState();
    render();
    return;
  }

  if (target.dataset.selectAccount) {
    state.ad.selectedAccountId = target.dataset.selectAccount;
    saveState();
    render();
    return;
  }

  if (target.dataset.taTab) {
    state.ta.myTab = target.dataset.taTab;
    saveState();
    render();
    return;
  }

  if (target.dataset.taHistoryFilter) {
    state.ta.historyFilter = target.dataset.taHistoryFilter;
    saveState();
    render();
    return;
  }

  if (target.dataset.moHistoryTab) {
    state.mo.historyTab = target.dataset.moHistoryTab;
    saveState();
    render();
    return;
  }

  if (target.dataset.adProjectTab) {
    state.ad.projectsTab = target.dataset.adProjectTab;
    saveState();
    render();
    return;
  }

  if (target.dataset.loadDraft) {
    const draft = getDraft(target.dataset.loadDraft);
    if (draft) {
      fillFormFromSource(draft, 'draft');
      showToast('Draft loaded into the form.');
      render();
    }
    return;
  }

  if (target.dataset.loadJob) {
    const job = getJob(target.dataset.loadJob);
    if (job) {
      fillFormFromSource({
        ...job,
        requirements: job.requirements.join('\n'),
        restrictionMajor: job.requirements[0] || '',
        restrictionLanguage: job.requirements[1] || '',
        restrictionOther: ''
      }, 'job');
      showToast('Published position loaded into the form.');
      render();
    }
    return;
  }

  if (target.dataset.deleteDraft) {
    deleteDraft(target.dataset.deleteDraft);
    return;
  }

  if (target.dataset.postDraft) {
    postJobFromDraft(target.dataset.postDraft);
    return;
  }

  if (target.dataset.reviewStatus) {
    reviewApplication(target.dataset.reviewStatus);
    return;
  }

  if (target.dataset.action) {
    switch (target.dataset.action) {
      case 'reset-demo':
        resetDemo();
        return;
      case 'clear-ta-filters':
        clearTaFilters();
        return;
      case 'apply-ta-filters':
        saveState();
        render();
        return;
      case 'choose-apply-cv':
        document.getElementById('apply-cv-input')?.click();
        return;
      case 'submit-application':
        submitApplication();
        return;
      case 'choose-profile-cv':
        document.getElementById('profile-cv-input')?.click();
        return;
      case 'save-profile':
        saveProfile();
        return;
      case 'add-course-record':
        addCourseRecord();
        return;
      case 'add-language-score':
        addLanguageScore();
        return;
      case 'save-draft':
        saveDraft();
        return;
      case 'post-job':
        postJob();
        return;
      case 'close-job':
        closeJob(target.dataset.jobId);
        return;
      case 'refresh-mo-apps':
        saveState();
        render();
        return;
      case 'request-supplement':
        requestSupplement();
        return;
      case 'clear-ad-account-filters':
        clearAdAccountFilters();
        return;
      case 'apply-ad-account-filters':
        saveState();
        render();
        return;
      case 'import-accounts':
        importAccounts();
        return;
      case 'export-accounts':
        exportAction('Account Management');
        return;
      case 'freeze-account':
        freezeAccount(target.dataset.accountId);
        return;
      case 'delete-account':
        deleteAccount(target.dataset.accountId);
        return;
      case 'remind-mo':
        remindMo(target.dataset.jobId);
        return;
      case 'export-projects':
        exportAction('Project Management');
        return;
      case 'clear-ad-log-filters':
        clearAdLogFilters();
        return;
      case 'apply-ad-log-filters':
        saveState();
        render();
        return;
      case 'export-logs':
        exportAction('Operation Log');
        return;
      default:
        return;
    }
  }
});

window.addEventListener('hashchange', render);
window.addEventListener('load', () => {
  if (!location.hash) {
    go('welcome');
  } else {
    render();
  }
});

  </script>
</body>
</html>
